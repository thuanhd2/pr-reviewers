redis:
  addr: "localhost:6379"
database:
  url: "postgres://pr_reviewer:pr_reviewer_dev@localhost:5432/pr_reviewer?sslmode=disable"

github:
  token: "" # or use GITHUB_TOKEN env var

scheduler:
  fetch_interval: "15m"
  cleanup_worktree_after_days: 30

projects_root:
  - /Users/thuanho/projects
  - /Users/thuanho/Documents/personal

executors:
  - name: claude-code
    active: true
    timeout: "60m"
  - name: deepseek
    active: true
    timeout: "60m"

repo_mappings:
  - repo: company/backend-api
    local_path: /Users/thuanho/projects/backend-api
    cli: claude-code
    extra_rules: ""
    remote: origin

deepseek:
  base_url: "https://api.deepseek.com"
  auth_token: ""
  model: "deepseek-v4-pro"
  default_opus_model: "deepseek-v4-pro"
  default_sonet_model: "deepseek-v4-pro"
  default_haku_model: "deepseek-v4-flash"